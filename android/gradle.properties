# 项目属性配置 / Project property configuration
# JVM 内存设置 / JVM memory settings
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# 启用 AndroidX / Enable AndroidX
android.useAndroidX=true
# 启用非传递 R 类 / Enable non-transitive R classes
android.nonTransitiveRClass=true
# Kotlin 代码风格 / Kotlin code style
kotlin.code.style=official
