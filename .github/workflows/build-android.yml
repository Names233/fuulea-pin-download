name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd android
          gradle assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          # 生成调试签名密钥 / Generate debug signing key
          keytool -genkeypair -v -keystore /tmp/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug,O=Debug,L=Debug,S=Debug,C=US"
          # 签名 release APK / Sign release APK
          cd android
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks /tmp/debug.keystore --ks-pass pass:android --key-pass pass:android --out app/build/outputs/apk/release/fuulea-pin-download-v1.0.3.apk app/build/outputs/apk/release/app-release-unsigned.apk 2>/dev/null || \
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign --ks /tmp/debug.keystore --ks-pass pass:android --key-pass pass:android --out app/build/outputs/apk/release/fuulea-pin-download-v1.0.3.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/fuulea-pin-download-v1.0.3.apk
          fail_on_unmatched_files: false

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuulea-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/fuulea-pin-download-v1.0.3.apk
          retention-days: 30
